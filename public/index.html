<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CRUD Pizzeria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .pizzas-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .pizzas-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 10px;
        }

        .pizza-card {
            background: #f8f9fa;
            border-left: 4px solid #764ba2;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .pizza-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .pizza-info p {
            color: #666;
            font-size: 14px;
            margin: 3px 0;
        }

        .pizza-price {
            font-weight: bold;
            color: #764ba2;
            font-size: 1.2em;
        }

        .pizza-buttons {
            display: flex;
            gap: 10px;
        }

        .pizza-buttons button {
            width: auto;
            padding: 8px 15px;
            font-size: 12px;
            background: #764ba2;
            border-radius: 3px;
        }

        .pizza-buttons button.delete {
            background: #e74c3c;
        }

        .pizza-buttons button:hover {
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }

        .pagination {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .hidden-id {
            display: none;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Gestion des Pizzas</h1>

        <div class="layout">
            <!-- Formulaire -->
            <div class="form-section">
                <h2 id="form-title">Ajouter une pizza</h2>
                <div id="form-message"></div>
                <form id="pizza-form">
                    <div class="hidden-id">
                        <input type="hidden" id="pizza-id" value="">
                    </div>

                    <div class="form-group">
                        <label for="name">Nom *</label>
                        <input type="text" id="name" name="name" required placeholder="Ex: Margherita">
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Ex: Tomate, mozzarella, basilic"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="price">Prix *</label>
                        <input type="number" id="price" name="price" step="0.01" required placeholder="Ex: 12.50">
                    </div>

                    <div class="form-group">
                        <label for="ingredients">Ingrédients (séparés par comma)</label>
                        <input type="text" id="ingredients" name="ingredients" placeholder="Ex: tomate, mozzarella, basilic">
                    </div>

                    <button type="submit" id="submit-btn">Créer une pizza</button>
                    <button type="button" id="cancel-btn" style="display: none; background: #999;">Annuler</button>
                </form>
            </div>

            <!-- Liste des pizzas -->
            <div class="pizzas-section">
                <h2>Pizzas disponibles</h2>
                <div id="pizzas-message"></div>
                <div id="pizzas-list" class="loading">Chargement...</div>
                <div class="pagination">
                    <button id="prev-btn" style="width: auto; padding: 5px 10px; background: #764ba2; font-size: 12px;">← Précédent</button>
                    <span id="page-info"></span>
                    <button id="next-btn" style="width: auto; padding: 5px 10px; background: #764ba2; font-size: 12px;">Suivant →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentPage = 0;
        const LIMIT = 5;
        let editingId = null;

        // ===== INITIALISATION =====
        document.addEventListener('DOMContentLoaded', () => {
            loadPizzas();
            document.getElementById('pizza-form').addEventListener('submit', handleSubmit);
            document.getElementById('cancel-btn').addEventListener('click', resetForm);
            document.getElementById('prev-btn').addEventListener('click', () => prevPage());
            document.getElementById('next-btn').addEventListener('click', () => nextPage());
        });

        // ===== CHARGER LES PIZZAS =====
        async function loadPizzas() {
            const skip = currentPage * LIMIT;
            try {
                const response = await fetch(`${API_URL}/pizzas?limit=${LIMIT}&skip=${skip}`);
                const data = await response.json();

                if (data.status === 200) {
                    displayPizzas(data.data.pizzas);
                    updatePagination(data.data.pagination);
                } else {
                    showError('Erreur lors du chargement');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Impossible de se connecter à l\'API');
            }
        }

        // ===== AFFICHER LES PIZZAS =====
        function displayPizzas(pizzas) {
            const list = document.getElementById('pizzas-list');

            if (pizzas.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">Aucune pizza trouvée</p>';
                return;
            }

            list.innerHTML = pizzas.map(pizza => `
                <div class="pizza-card">
                    <div class="pizza-info">
                        <h3>${pizza.name}</h3>
                        <p>${pizza.description || 'Pas de description'}</p>
                        <p style="margin-top: 8px;">
                            <strong>Ingrédients:</strong> ${pizza.ingredients.join(', ') || 'Aucun'}
                        </p>
                    </div>
                    <div style="text-align: right;">
                        <div class="pizza-price">${pizza.price.toFixed(2)} €</div>
                        <div class="pizza-buttons">
                            <button onclick="editPizza('${pizza.id}')">✏️ Éditer</button>
                            <button class="delete" onclick="deletePizza('${pizza.id}')">🗑️ Supprimer</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== ACTUALISER LA PAGINATION =====
        function updatePagination(pagination) {
            const pageInfo = document.getElementById('page-info');
            pageInfo.textContent = `Page ${pagination.page} (${pagination.total} pizzas)`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = (currentPage + 1) * LIMIT >= pagination.total;
        }

        // ===== SOUMETTRE LE FORMULAIRE =====
        async function handleSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            const price = parseFloat(document.getElementById('price').value);
            const ingredients = document.getElementById('ingredients').value
                .split(',')
                .map(i => i.trim())
                .filter(i => i);

            const data = { name, description, price, ingredients };

            try {
                const method = editingId ? 'PUT' : 'POST';
                const url = editingId ? `${API_URL}/pizzas/${editingId}` : `${API_URL}/pizzas`;

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.status >= 200 && result.status < 300) {
                    showSuccess(editingId ? 'Pizza mise à jour!' : 'Pizza créée!');
                    resetForm();
                    loadPizzas();
                } else {
                    showError(result.error || 'Erreur');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Erreur lors de l\'envoi');
            }
        }

        // ===== ÉDITER UNE PIZZA =====
        async function editPizza(id) {
            try {
                const response = await fetch(`${API_URL}/pizzas/${id}`);
                const data = await response.json();

                if (data.status === 200) {
                    const pizza = data.data;
                    document.getElementById('pizza-id').value = id;
                    document.getElementById('name').value = pizza.name;
                    document.getElementById('description').value = pizza.description;
                    document.getElementById('price').value = pizza.price;
                    document.getElementById('ingredients').value = pizza.ingredients.join(', ');

                    document.getElementById('form-title').textContent = 'Éditer la pizza';
                    document.getElementById('submit-btn').textContent = 'Mettre à jour';
                    document.getElementById('cancel-btn').style.display = 'block';

                    editingId = id;
                    document.getElementById('pizza-form').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                showError('Impossible de charger la pizza');
            }
        }

        // ===== SUPPRIMER UNE PIZZA =====
        async function deletePizza(id) {
            if (!confirm('Êtes-vous sûr?')) return;

            try {
                const response = await fetch(`${API_URL}/pizzas/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.status === 200) {
                    showSuccess('Pizza supprimée!');
                    loadPizzas();
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('Erreur lors de la suppression');
            }
        }

        // ===== RÉINITIALISER LE FORMULAIRE =====
        function resetForm() {
            document.getElementById('pizza-form').reset();
            document.getElementById('pizza-id').value = '';
            document.getElementById('form-title').textContent = 'Ajouter une pizza';
            document.getElementById('submit-btn').textContent = 'Créer une pizza';
            document.getElementById('cancel-btn').style.display = 'none';
            editingId = null;
        }

        // ===== PAGINATION =====
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                loadPizzas();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextPage() {
            currentPage++;
            loadPizzas();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== MESSAGES =====
        function showError(msg) {
            const div = document.getElementById('form-message');
            div.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 5000);
        }

        function showSuccess(msg) {
            const div = document.getElementById('form-message');
            div.innerHTML = `<div class="success">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
